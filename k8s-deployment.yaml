apiVersion: apps/v1
kind: Deployment
metadata:
  name: corporate-web-deployment
  labels:
    app: corporate-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: corporate-web
  template:
    metadata:
      labels:
        app: corporate-web
    spec:
      containers:
      - name: corporate-web-container
        image: corporate-website:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: corporate-web-service
spec:
  type: NodePort
  selector:
    app: corporate-web
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
